name: Notebook Sanity Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install nbconvert
        run: pip install nbconvert

      - name: Convert notebook to script (validates notebook structure)
        run: jupyter nbconvert --to script notebooks/retina_ai_dropout_prediction.ipynb --output-dir . --output retina_check

      - name: Check Python syntax
        run: python -m py_compile retina_check.py
